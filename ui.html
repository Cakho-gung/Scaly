<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaly – Color Scale Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2e2e2e;
            --padding: 28px;
            --radius-card: 0;
            --radius-swatch: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background-color: var(--card);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 100px; /* Space for sticky footer */
        }

        .top-row {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        .input-side {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        .color-preview-wrap {
            position: relative;
            width: 190px;
            height: 100px;
        }

        .color-preview {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-swatch);
            background: #BBB9FB;
            transition: background-color .2s ease;
            cursor: pointer;
        }

        .color-name {
            position: absolute;
            bottom: 8px;
            left: 10px;
            right: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            transition: color .2s;
        }

        .hex-input {
            width: 190px;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            outline: none;
            transition: border-color .15s;
            letter-spacing: .5px;
        }
        .hex-input:focus { border-color: var(--accent); }
        .hex-input.invalid { border-color: #ef4444; background: #fff5f5; }

        .v-divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
            flex-shrink: 0;
        }

        .root-side { 
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 1;
        }

        .root-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .swatch-item {
            cursor: pointer;
            border-radius: 8px;
        }

        .swatch-box {
            width: 100%;
            height: 100px;
            border-radius: var(--radius-swatch);
            position: relative;
            transition: box-shadow .15s;
        }
        .swatch-box.selected {
            box-shadow: 0 0 0 3px white, 0 0 0 5px var(--accent);
        }

        .swatch-info { margin-top: 12px; line-height: 1.3; }
        .swatch-label { font-weight: 600; font-size: 11px; color: var(--text); }
        .swatch-hex { font-size: 10px; color: var(--muted); text-transform: uppercase; }

        .h-divider { height: 1px; background: var(--border); margin: 0 0 24px; }

        .section-block { margin-bottom: 24px; }

        .util-label { display: flex; align-items: center; gap: 6px; }
        .util-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .shade-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 8px;
            margin-top: 4px;
        }

        .shade-item .swatch-box { height: 56px; width: 100%; }

        .actions {
            display: flex;
            gap: 10px;
            padding: var(--padding);
            border-top: 1px solid var(--border);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .btn {
            padding: 9px 20px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all .15s;
        }
        .btn-primary { background: var(--text); color: #fff; }
        .btn-primary:hover { background: #000; }
        .btn-secondary { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-secondary:hover { background: var(--bg); }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
            grid-column: 1 / -1;
        }

        .error-msg {
            font-size: 11px;
            color: #ef4444;
            margin-top: 4px;
            min-height: 16px;
        }

        /* ── Color Picker Popup ── */
        .picker-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,.3);
        }
        .picker-overlay.open { display: flex; align-items: center; justify-content: center; }

        .picker-popup {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            width: 280px;
        }

        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .picker-header span { font-weight: 600; font-size: 13px; }
        .picker-close {
            background: none; border: none; cursor: pointer;
            font-size: 18px; color: var(--muted); padding: 0; line-height: 1;
        }

        .picker-sv-area {
            width: 240px;
            height: 160px;
            border-radius: 8px;
            position: relative;
            cursor: crosshair;
            margin-bottom: 12px;
            background: linear-gradient(to top, #000, transparent),
                        linear-gradient(to right, #fff, transparent);
        }
        .picker-sv-cursor {
            width: 14px; height: 14px;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 3px rgba(0,0,0,.4);
            position: absolute;
            transform: translate(-50%,-50%);
            pointer-events: none;
        }

        .picker-hue-bar {
            width: 240px;
            height: 14px;
            border-radius: 7px;
            position: relative;
            cursor: pointer;
            margin-bottom: 12px;
            background: linear-gradient(to right,
                hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%),
                hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
        }
        .picker-hue-cursor {
            width: 6px; height: 18px;
            border: 2px solid white;
            border-radius: 3px;
            box-shadow: 0 0 3px rgba(0,0,0,.4);
            position: absolute;
            top: -2px;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .picker-preview-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .picker-mini-preview {
            width: 36px; height: 36px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .picker-hex-display {
            font-family: 'Inter', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
        }
        .picker-apply {
            margin-left: auto;
            padding: 6px 16px;
            border-radius: 6px;
            background: var(--text);
            color: #fff;
            border: none;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .picker-apply:hover { background: #000; }
    </style>
</head>
<body>
<div class="card">
    <div class="scroll-container">
        <div class="top-row">
            <div class="input-side">
                <div class="section-label">Input Color</div>
                <div class="color-preview-wrap">
                    <div id="main-preview" class="color-preview" title="Click to open color picker"></div>
                    <div id="color-name" class="color-name">LAVENDER BLUE</div>
                </div>
                <input id="hex-input" class="hex-input" type="text" value="#BBB9FB" spellcheck="false" placeholder="hex, rgb(), hsl()...">
                <div id="error-msg" class="error-msg"></div>
            </div>

            <div class="v-divider"></div>

            <div class="root-side">
                <div class="section-label">Root Option</div>
                <div id="root-grid" class="root-grid">
                    <div class="placeholder">Enter a hex color to see options</div>
                </div>
            </div>
        </div>

        <div class="h-divider"></div>

        <div class="section-block">
            <div class="section-label">Shade Scale</div>
            <div id="shade-grid" class="shade-grid">
                <div class="placeholder">Select a root option to generate the scale</div>
            </div>
        </div>

        <div class="section-block">
            <div class="section-label util-label"><span class="util-dot" style="background:#f59e0b"></span>Warning Scale</div>
            <div id="warning-grid" class="shade-grid"></div>
        </div>

        <div class="section-block">
            <div class="section-label util-label"><span class="util-dot" style="background:#22c55e"></span>Success Scale</div>
            <div id="success-grid" class="shade-grid"></div>
        </div>

        <div class="section-block">
            <div class="section-label util-label"><span class="util-dot" style="background:#ef4444"></span>Error Scale</div>
            <div id="error-grid" class="shade-grid"></div>
        </div>
    </div>

    <div class="actions">
        <button id="create-btn" class="btn btn-primary">Generate in Figma</button>
        <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
    </div>
</div>

<!-- Color Picker Popup -->
<div id="picker-overlay" class="picker-overlay">
    <div class="picker-popup">
        <div class="picker-header">
            <span>Pick a Color</span>
            <button id="picker-close" class="picker-close">&times;</button>
        </div>
        <div id="picker-sv" class="picker-sv-area">
            <div id="picker-sv-cursor" class="picker-sv-cursor"></div>
        </div>
        <div id="picker-hue" class="picker-hue-bar">
            <div id="picker-hue-cursor" class="picker-hue-cursor"></div>
        </div>
        <div class="picker-preview-row">
            <div id="picker-preview" class="picker-mini-preview"></div>
            <div id="picker-hex" class="picker-hex-display">#000000</div>
            <button id="picker-apply" class="picker-apply">Apply</button>
        </div>
    </div>
</div>

<script>
/* ============================================================
   COLOR MATH – pure JS, no external deps needed
   Supports: hex ↔ linear RGB ↔ OKLAB ↔ OKLCH
   ============================================================ */

function hexToLinearRgb(hex) {
    hex = hex.replace(/^#/, '');
    if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
    const r = parseInt(hex.slice(0,2), 16) / 255;
    const g = parseInt(hex.slice(2,4), 16) / 255;
    const b = parseInt(hex.slice(4,6), 16) / 255;
    const toLinear = c => c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    return [toLinear(r), toLinear(g), toLinear(b)];
}

function linearRgbToOklab(r, g, b) {
    const l_ = Math.cbrt(0.4122214708*r + 0.5363325363*g + 0.0514459929*b);
    const m_ = Math.cbrt(0.2119034982*r + 0.6806995451*g + 0.1073969566*b);
    const s_ = Math.cbrt(0.0883024619*r + 0.2817188376*g + 0.6299787005*b);
    return [
        0.2104542553*l_ + 0.7936177850*m_ - 0.0040720468*s_,
        1.9779984951*l_ - 2.4285922050*m_ + 0.4505937099*s_,
        0.0259040371*l_ + 0.7827717662*m_ - 0.8086757660*s_,
    ];
}

function oklabToOklch(L, a, b) {
    const C = Math.sqrt(a*a + b*b);
    let H = Math.atan2(b, a) * 180 / Math.PI;
    if (H < 0) H += 360;
    return [L, C, H];
}

function oklchToOklab(L, C, H) {
    const h = H * Math.PI / 180;
    return [L, C * Math.cos(h), C * Math.sin(h)];
}

function oklabToLinearRgb(L, a, b) {
    const l_ = L + 0.3963377774*a + 0.2158037573*b;
    const m_ = L - 0.1055613458*a - 0.0638541728*b;
    const s_ = L - 0.0894841775*a - 1.2914855480*b;
    const l  = l_*l_*l_, m = m_*m_*m_, s = s_*s_*s_;
    return [
         4.0767416621*l - 3.3077115913*m + 0.2309699292*s,
        -1.2684380046*l + 2.6097574011*m - 0.3413193965*s,
        -0.0041960863*l - 0.7034186147*m + 1.7076147010*s,
    ];
}

function linearRgbToHex(r, g, b) {
    const toSrgb = c => {
        c = Math.max(0, Math.min(1, c));
        return c <= 0.0031308 ? Math.round(c * 12.92 * 255) : Math.round((1.055 * Math.pow(c, 1/2.4) - 0.055) * 255);
    };
    return '#' + [r,g,b].map(c => toSrgb(c).toString(16).padStart(2,'0')).join('');
}

function hexToOklch(hex) {
    const [r,g,b] = hexToLinearRgb(hex);
    const [L,a,bb] = linearRgbToOklab(r,g,b);
    return oklabToOklch(L, a, bb);
}

/* ── OKLCH to RGB with Iterative Gamut Mapping ── */

function oklchToRgbRaw(L, C, H) {
    const a = C * Math.cos(H * Math.PI / 180);
    const b = C * Math.sin(H * Math.PI / 180);

    const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
    const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
    const s_ = L - 0.0894841775 * a - 1.2914855480 * b;

    const l = l_ * l_ * l_;
    const m = m_ * m_ * m_;
    const s = s_ * s_ * s_;

    const rLinear = +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
    const gLinear = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
    const bLinear = -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s;

    return [
        linearToSrgb(rLinear) * 255,
        linearToSrgb(gLinear) * 255,
        linearToSrgb(bLinear) * 255
    ];
}

function isInsideSrgb(r, g, b) {
    const eps = 0.001;
    return r >= -eps && r <= 255 + eps &&
           g >= -eps && g <= 255 + eps &&
           b >= -eps && b <= 255 + eps;
}

function oklchToHex(L, C, H) {
    let [r, g, b] = oklchToRgbRaw(L, C, H);

    // If out of gamut, perform Iterative Gamut Mapping (Shrink Chroma)
    if (!isInsideSrgb(r, g, b)) {
        let currentC = C;
        // Binary search or iterative reduction to find maximum chroma inside sRGB
        for (let i = 0; i < 20; i++) {
            currentC *= 0.9; // Reduce chroma by 10% each step
            [r, g, b] = oklchToRgbRaw(L, currentC, H);
            if (isInsideSrgb(r, g, b)) break;
        }
    }

    // Final clamping just in case
    const clamp = (v) => Math.round(Math.max(0, Math.min(255, v)));
    return rgbToHex(clamp(r), clamp(g), clamp(b));
}

function isValidHex(hex) {
    return /^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(hex.trim());
}

function normalizeHex(hex) {
    hex = hex.trim().replace(/^#/, '');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    return '#' + hex.toLowerCase();
}

/* ── Multi-format CSS Color Parser ── */

function srgbToLinear(c) { return c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); }
function linearToSrgb(c) { c=Math.max(0,Math.min(1,c)); return c<=0.0031308 ? c*12.92 : 1.055*Math.pow(c,1/2.4)-0.055; }

function rgbToHex(r, g, b) {
    return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
}

function hslToRgb(h, s, l) {
    h = ((h % 360) + 360) % 360;
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1-l);
    const f = n => { const k = (n + h/30) % 12; return l - a * Math.max(-1, Math.min(k-3, 9-k, 1)); };
    return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

function parseCssColor(input) {
    input = input.trim().toLowerCase();

    // 1. Hex
    if (/^#?([0-9a-f]{3}|[0-9a-f]{6})$/.test(input)) {
        return normalizeHex(input);
    }

    // 2. CSS named color
    if (CSS_NAMED_COLORS[input]) {
        return CSS_NAMED_COLORS[input];
    }

    // 3. rgb(r, g, b) or rgb(r g b)
    let m = input.match(/^rgba?\(\s*(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})/);
    if (m) return rgbToHex(+m[1], +m[2], +m[3]);

    // 4. hsl(h, s%, l%) or hsl(h s% l%)
    m = input.match(/^hsla?\(\s*([\d.]+)(?:deg)?[,\s]+([\d.]+)%[,\s]+([\d.]+)%/);
    if (m) { const [r,g,b] = hslToRgb(+m[1], +m[2], +m[3]); return rgbToHex(r,g,b); }

    // 5. oklch(L C H) or oklch(L% C H)
    m = input.match(/^oklch\(\s*([\d.]+)(%?)\s+([\d.]+)\s+([\d.]+)/);
    if (m) {
        let L = +m[1]; if (m[2]==='%') L /= 100;
        return oklchToHex(L, +m[3], +m[4]);
    }

    return null; // invalid
}

/* ── CSS Named Colors (compact) ── */
const CSS_NAMED_COLORS = {
    aliceblue:'#f0f8ff',antiquewhite:'#faebd7',aqua:'#00ffff',aquamarine:'#7fffd4',
    azure:'#f0ffff',beige:'#f5f5dc',bisque:'#ffe4c4',black:'#000000',
    blanchedalmond:'#ffebcd',blue:'#0000ff',blueviolet:'#8a2be2',brown:'#a52a2a',
    burlywood:'#deb887',cadetblue:'#5f9ea0',chartreuse:'#7fff00',chocolate:'#d2691e',
    coral:'#ff7f50',cornflowerblue:'#6495ed',cornsilk:'#fff8dc',crimson:'#dc143c',
    cyan:'#00ffff',darkblue:'#00008b',darkcyan:'#008b8b',darkgoldenrod:'#b8860b',
    darkgray:'#a9a9a9',darkgreen:'#006400',darkkhaki:'#bdb76b',darkmagenta:'#8b008b',
    darkolivegreen:'#556b2f',darkorange:'#ff8c00',darkorchid:'#9932cc',darkred:'#8b0000',
    darksalmon:'#e9967a',darkseagreen:'#8fbc8f',darkslateblue:'#483d8b',darkslategray:'#2f4f4f',
    darkturquoise:'#00ced1',darkviolet:'#9400d3',deeppink:'#ff1493',deepskyblue:'#00bfff',
    dimgray:'#696969',dodgerblue:'#1e90ff',firebrick:'#b22222',floralwhite:'#fffaf0',
    forestgreen:'#228b22',fuchsia:'#ff00ff',gainsboro:'#dcdcdc',ghostwhite:'#f8f8ff',
    gold:'#ffd700',goldenrod:'#daa520',gray:'#808080',green:'#008000',
    greenyellow:'#adff2f',honeydew:'#f0fff0',hotpink:'#ff69b4',indianred:'#cd5c5c',
    indigo:'#4b0082',ivory:'#fffff0',khaki:'#f0e68c',lavender:'#e6e6fa',
    lavenderblush:'#fff0f5',lawngreen:'#7cfc00',lemonchiffon:'#fffacd',lightblue:'#add8e6',
    lightcoral:'#f08080',lightcyan:'#e0ffff',lightgoldenrodyellow:'#fafad2',lightgray:'#d3d3d3',
    lightgreen:'#90ee90',lightpink:'#ffb6c1',lightsalmon:'#ffa07a',lightseagreen:'#20b2aa',
    lightskyblue:'#87cefa',lightslategray:'#778899',lightsteelblue:'#b0c4de',lightyellow:'#ffffe0',
    lime:'#00ff00',limegreen:'#32cd32',linen:'#faf0e6',magenta:'#ff00ff',
    maroon:'#800000',mediumaquamarine:'#66cdaa',mediumblue:'#0000cd',mediumorchid:'#ba55d3',
    mediumpurple:'#9370db',mediumseagreen:'#3cb371',mediumslateblue:'#7b68ee',
    mediumspringgreen:'#00fa9a',mediumturquoise:'#48d1cc',mediumvioletred:'#c71585',
    midnightblue:'#191970',mintcream:'#f5fffa',mistyrose:'#ffe4e1',moccasin:'#ffe4b5',
    navajowhite:'#ffdead',navy:'#000080',oldlace:'#fdf5e6',olive:'#808000',
    olivedrab:'#6b8e23',orange:'#ffa500',orangered:'#ff4500',orchid:'#da70d6',
    palegoldenrod:'#eee8aa',palegreen:'#98fb98',paleturquoise:'#afeeee',palevioletred:'#db7093',
    papayawhip:'#ffefd5',peachpuff:'#ffdab9',peru:'#cd853f',pink:'#ffc0cb',
    plum:'#dda0dd',powderblue:'#b0e0e6',purple:'#800080',rebeccapurple:'#663399',
    red:'#ff0000',rosybrown:'#bc8f8f',royalblue:'#4169e1',saddlebrown:'#8b4513',
    salmon:'#fa8072',sandybrown:'#f4a460',seagreen:'#2e8b57',seashell:'#fff5ee',
    sienna:'#a0522d',silver:'#c0c0c0',skyblue:'#87ceeb',slateblue:'#6a5acd',
    slategray:'#708090',snow:'#fffafa',springgreen:'#00ff7f',steelblue:'#4682b4',
    tan:'#d2b48c',teal:'#008080',thistle:'#d8bfd8',tomato:'#ff6347',
    turquoise:'#40e0d0',violet:'#ee82ee',wheat:'#f5deb3',white:'#ffffff',
    whitesmoke:'#f5f5f5',yellow:'#ffff00',yellowgreen:'#9acd32'
};

/* ── Nearest Color Name Lookup ── */
function hexToSrgb(hex) {
    hex = hex.replace('#','');
    return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}

function findNearestColorName(hex) {
    const [r1,g1,b1] = hexToSrgb(hex);
    let best = '', bestDist = Infinity;
    for (const [name, val] of Object.entries(CSS_NAMED_COLORS)) {
        const [r2,g2,b2] = hexToSrgb(val);
        const rMean = (r1+r2)/2;
        const dr = r1-r2, dg = g1-g2, db = b1-b2;
        const dist = Math.sqrt((2+rMean/256)*dr*dr + 4*dg*dg + (2+(255-rMean)/256)*db*db);
        if (dist < bestDist) { bestDist = dist; best = name; }
    }
    // Split camelCase → uppercase with spaces
    return best.replace(/([a-z])([A-Z])/g, '$1 $2').toUpperCase();
}

/** Pick a contrasting color from the scale for the color name overlay.
 *  Light input (step 0–4) → 5 steps darker. Dark input (step 6–10) → 5 steps lighter.
 *  Step 5 (500) → use step 0 (50). */
function getContrastColorFromScale(hex) {
    const scale = generateColorScale(hex);
    const [baseL] = hexToOklch(hex);
    // Find which step the input falls on
    let baseIndex = 0, minDiff = Infinity;
    for (let i = 0; i < STEPS; i++) {
        const d = Math.abs(baseL - TARGET_L[i]);
        if (d < minDiff) { minDiff = d; baseIndex = i; }
    }
    let contrastIdx;
    if (baseIndex <= 4) contrastIdx = Math.min(baseIndex + 5, 10);
    else if (baseIndex === 5) contrastIdx = 0;
    else contrastIdx = Math.max(baseIndex - 5, 0);
    return scale[contrastIdx].hex;
}

/* ============================================================
   COLOR SCALE LOGIC  (Logic.md)
   ============================================================ */

const TARGET_L = [0.98, 0.95, 0.90, 0.82, 0.72, 0.60, 0.50, 0.40, 0.30, 0.20, 0.15];
const TW_KEYS  = ['50','100','200','300','400','500','600','700','800','900','950'];
const STEPS    = 11;

function generateColorScale(rootHex, rawInputHex) {
    rootHex = normalizeHex(rootHex);
    const [baseL, baseC, baseH] = hexToOklch(rootHex);
    const H = isNaN(baseH) ? 0 : baseH;

    // Step 3.2 – find base index (where the root color anchors)
    let baseIndex = 0, minDiff = Infinity;
    for (let i = 0; i < STEPS; i++) {
        const d = Math.abs(baseL - TARGET_L[i]);
        if (d < minDiff) { minDiff = d; baseIndex = i; }
    }

    // Step 3.3 – Adaptive Lightness Curve (Sigmoid-like distribution)
    const L = [];
    for (let i = 0; i < STEPS; i++) {
        const t = i / (STEPS - 1);
        // Default curve from 0.98 down to 0.12
        const defaultL = 0.98 - t * 0.86;
        
        // We find the "natural" T where our baseL would fit in a 0.98 -> 0.12 range
        const naturalT = (0.98 - baseL) / 0.86;
        const shift = baseIndex / (STEPS - 1) - naturalT;
        
        // Apply a weighted shift to make the curve pass through baseL at baseIndex
        const weight = Math.pow(Math.sin(t * Math.PI), 0.8);
        L.push(Math.max(0.05, Math.min(0.99, defaultL + (shift * 0.86) * weight)));
    }

    // Step 3.4 – Aggressive chroma boost (Flattened curve + 10% multiplier)
    const curveExp   = 0.4; // Very fat curve for maximum middle-range vibrancy
    const baseT      = baseIndex / (STEPS - 1);
    const baseFactor = 0.1 + 0.9 * Math.pow(Math.sin(baseT * Math.PI), curveExp);
    const maxC       = (baseC / baseFactor) * 1.1; // 10% global boost
    const C = [];
    for (let i = 0; i < STEPS; i++) {
        const t = i / (STEPS - 1);
        const factor = 0.1 + 0.9 * Math.pow(Math.sin(t * Math.PI), curveExp);
        C.push(i === baseIndex ? baseC : maxC * factor);
    }

    // Step 3.4.1 – Specific boost for 500 and 600
    for (let i = 0; i < STEPS; i++) {
        if (i === 5 || i === 6) { // Index 5=500, 6=600
            L[i] = Math.min(0.98, L[i] + 0.025); // Nudge lightness up
            C[i] *= 1.08;                        // Nudge chroma up by 8%
        }
    }

    // Find where the raw input color falls (for * marker)
    let overrideIndex = -1;
    let overrideHex = '';
    if (rawInputHex) {
        rawInputHex = normalizeHex(rawInputHex);
        const [rawL] = hexToOklch(rawInputHex);
        let minD = Infinity;
        for (let i = 0; i < STEPS; i++) {
            const d = Math.abs(rawL - TARGET_L[i]);
            if (d < minD) { minD = d; overrideIndex = i; }
        }
        overrideHex = rawInputHex;
    }

    // The * marker goes on the override (input) position if present, otherwise on root anchor
    const markerIndex = overrideIndex !== -1 ? overrideIndex : baseIndex;

    // Step 3.5 – build colors with Hue Shifting
    return Array.from({ length: STEPS }, (_, i) => {
        let hex = i === baseIndex ? rootHex : oklchToHex(L[i], C[i], H);
        if (i === overrideIndex) hex = overrideHex;

        // Apply Hue Shifting for smoother transitions in "difficult" ranges
        let shiftedH = H;
        if (H >= 60 && H <= 115) { // Yellow/Lime range
            // Shift towards Orange (Hue ~40) as it gets darker
            const shiftFactor = Math.max(0, (0.9 - L[i]) / 0.7);
            shiftedH = H - (H - 45) * shiftFactor * 0.6;
        } else if (H >= 180 && H <= 220) { // Cyan/Cool Blue range
            // Shift towards deeper Blue (Hue ~250) as it gets darker
            const shiftFactor = Math.max(0, (0.8 - L[i]) / 0.6);
            shiftedH = H + (250 - H) * shiftFactor * 0.3;
        }

        if (i !== baseIndex && i !== overrideIndex) {
            hex = oklchToHex(L[i], C[i], shiftedH);
        }

        return {
            key: TW_KEYS[i] + (i === markerIndex ? '*' : ''),
            hex,
            isAnchor: i === baseIndex,
        };
    });
}

function generateRootVariants(inputHex) {
    inputHex = normalizeHex(inputHex);
    // Generate initial scale from input, then use the 500 step (index 5)
    const initialScale = generateColorScale(inputHex);
    const true500 = initialScale[5]; // always use the computed 500 shade
    const [bL, bC, bH] = hexToOklch(true500.hex);
    const H = isNaN(bH) ? 0 : bH;

    return [
        { hex: true500.hex,                                                         label: 'Original' },
        { hex: oklchToHex(bL, Math.min(bC + 0.04, 0.32), H + 10),                 label: '+Hue +10°' },
        { hex: oklchToHex(bL, Math.min(bC + 0.04, 0.32), H - 10),                 label: '−Hue −10°' },
        { hex: oklchToHex(bL, Math.min(bC + 0.08, 0.35), H),                      label: '+Sat' },
    ];
}

/* ============================================================
   UI
   ============================================================ */

const hexInputEl  = document.getElementById('hex-input');
const mainPreview = document.getElementById('main-preview');
const rootGridEl  = document.getElementById('root-grid');
const shadeGridEl = document.getElementById('shade-grid');
const errorMsg    = document.getElementById('error-msg');
const createBtn   = document.getElementById('create-btn');
const cancelBtn   = document.getElementById('cancel-btn');

const colorNameEl = document.getElementById('color-name');

let state = { inputHex: '', roots: [], selectedRoot: 0, scale: [] };

function renderRoots() {
    rootGridEl.innerHTML = '';
    state.roots.forEach((root, idx) => {
        const isSelected = idx === state.selectedRoot;
        const item = document.createElement('div');
        item.className = 'swatch-item';
        item.innerHTML = `
            <div class="swatch-box${isSelected ? ' selected' : ''}" style="background:${root.hex}"></div>
            <div class="swatch-info">
                <div class="swatch-label">500</div>
                <div class="swatch-hex">${root.hex.replace('#','').toUpperCase()}</div>
            </div>
        `;
        item.addEventListener('click', () => {
            state.selectedRoot = idx;
            rebuildScale();
        });
        rootGridEl.appendChild(item);
    });
}

function renderGrid(gridId, scaleData) {
    const gridEl = document.getElementById(gridId);
    if (!gridEl) return;
    gridEl.innerHTML = '';
    scaleData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'swatch-item shade-item';
        div.innerHTML = `
            <div class="swatch-box" style="background:${item.hex}"></div>
            <div class="swatch-info">
                <div class="swatch-label">${item.key}</div>
                <div class="swatch-hex">${item.hex.replace('#','').toUpperCase()}</div>
            </div>
        `;
        gridEl.appendChild(div);
    });
}

function rebuildScale() {
    if (!state.roots.length) return;
    const activeRoot = state.roots[state.selectedRoot];
    
    // 1. Primary Scale
    state.scale = generateColorScale(activeRoot.hex, state.inputHex);
    
    // 2. Utility Scales (Enhanced Hue Rotation with Floors)
    const [bL, bC, bH] = hexToOklch(activeRoot.hex);
    
    // Logic to maintain "vibe" but ensure "functionality"
    // We boost Chroma if it's too low and normalize Lightness for alerts
    const getUtilRoot = (targetH, minC, targetL) => {
        const finalC = Math.max(bC, minC); // Ensure color is "vibrant" enough
        // Blend original lightness with a target "alert" lightness
        const finalL = Math.max(0.45, Math.min(0.8, (bL + targetL) / 2)); 
        return oklchToHex(finalL, finalC, targetH);
    };

    const warningRoot = getUtilRoot(75,  0.14, 0.75); // Orange/Yellow - needs high L
    const successRoot = getUtilRoot(145, 0.12, 0.62); // Green - mid L
    const errorRoot   = getUtilRoot(28,  0.16, 0.55); // Red - needs lower L and higher C
    
    const warningScale = generateColorScale(warningRoot);
    const successScale = generateColorScale(successRoot);
    const errorScale   = generateColorScale(errorRoot);
    
    renderRoots();
    renderGrid('shade-grid', state.scale);
    renderGrid('warning-grid', warningScale);
    renderGrid('success-grid', successScale);
    renderGrid('error-grid', errorScale);
}

function onInputChange() {
    const raw = hexInputEl.value.trim();
    const parsed = parseCssColor(raw);

    hexInputEl.classList.toggle('invalid', raw.length > 1 && !parsed);
    errorMsg.textContent = raw.length > 1 && !parsed ? 'Unrecognized color format' : '';

    if (!parsed) {
        colorNameEl.textContent = '';
        return;
    }

    // Update preview & color name with contrast text
    mainPreview.style.background = parsed;
    const name = findNearestColorName(parsed);
    colorNameEl.textContent = name;
    colorNameEl.style.color = getContrastColorFromScale(parsed);

    if (parsed !== state.inputHex) {
        state.inputHex     = parsed;
        state.selectedRoot = 0;
        state.roots        = generateRootVariants(parsed);
    }

    rebuildScale();
}

hexInputEl.addEventListener('input', onInputChange);
hexInputEl.addEventListener('paste', () => setTimeout(onInputChange, 0));

/* ============================================================
   COLOR PICKER (HSV model)
   ============================================================ */

const pickerOverlay   = document.getElementById('picker-overlay');
const pickerSV        = document.getElementById('picker-sv');
const pickerSVCursor  = document.getElementById('picker-sv-cursor');
const pickerHue       = document.getElementById('picker-hue');
const pickerHueCursor = document.getElementById('picker-hue-cursor');
const pickerPreview   = document.getElementById('picker-preview');
const pickerHexEl     = document.getElementById('picker-hex');
const pickerApply     = document.getElementById('picker-apply');
const pickerClose     = document.getElementById('picker-close');

let pk = { h: 0, s: 1, v: 1 }; // current HSV

function hsvToRgb255(h, s, v) {
    h = ((h%360)+360)%360;
    const c = v*s, x = c*(1-Math.abs((h/60)%2-1)), m = v-c;
    let r1,g1,b1;
    if(h<60){r1=c;g1=x;b1=0;}else if(h<120){r1=x;g1=c;b1=0;}
    else if(h<180){r1=0;g1=c;b1=x;}else if(h<240){r1=0;g1=x;b1=c;}
    else if(h<300){r1=x;g1=0;b1=c;}else{r1=c;g1=0;b1=x;}
    return [Math.round((r1+m)*255), Math.round((g1+m)*255), Math.round((b1+m)*255)];
}

function rgbToHsv(r, g, b) {
    r/=255; g/=255; b/=255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    let h=0;
    if(d>0){
        if(max===r) h=60*(((g-b)/d)%6);
        else if(max===g) h=60*((b-r)/d+2);
        else h=60*((r-g)/d+4);
    }
    if(h<0) h+=360;
    const s = max===0 ? 0 : d/max;
    return [h, s, max];
}

function updatePickerUI() {
    const [r,g,b] = hsvToRgb255(pk.h, pk.s, pk.v);
    const hex = rgbToHex(r,g,b);
    // Update SV area background hue
    pickerSV.style.background =
        `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, hsl(${pk.h},100%,50%))`;
    // Position SV cursor
    pickerSVCursor.style.left = (pk.s * 240) + 'px';
    pickerSVCursor.style.top  = ((1 - pk.v) * 160) + 'px';
    // Position hue cursor
    pickerHueCursor.style.left = (pk.h / 360 * 240) + 'px';
    // Preview
    pickerPreview.style.background = hex;
    pickerHexEl.textContent = hex.toUpperCase();
}

function openPicker() {
    // Init from current input color
    const hex = state.inputHex || '#ff0000';
    const [r,g,b] = hexToSrgb(hex);
    const [h,s,v] = rgbToHsv(r,g,b);
    pk = { h, s, v };
    updatePickerUI();
    pickerOverlay.classList.add('open');
}

function closePicker() { pickerOverlay.classList.remove('open'); }

mainPreview.addEventListener('click', openPicker);
pickerClose.addEventListener('click', closePicker);
pickerOverlay.addEventListener('click', e => { if(e.target===pickerOverlay) closePicker(); });

pickerApply.addEventListener('click', () => {
    const [r,g,b] = hsvToRgb255(pk.h, pk.s, pk.v);
    const hex = rgbToHex(r,g,b);
    hexInputEl.value = hex;
    closePicker();
    onInputChange();
});

// Drag on SV area
function handleSV(e) {
    const rect = pickerSV.getBoundingClientRect();
    pk.s = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    pk.v = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
    updatePickerUI();
}
pickerSV.addEventListener('pointerdown', e => {
    handleSV(e); pickerSV.setPointerCapture(e.pointerId);
    const move = ev => handleSV(ev);
    const up = () => { pickerSV.removeEventListener('pointermove', move); };
    pickerSV.addEventListener('pointermove', move);
    pickerSV.addEventListener('pointerup', up, { once: true });
});

// Drag on Hue bar
function handleHue(e) {
    const rect = pickerHue.getBoundingClientRect();
    pk.h = Math.max(0, Math.min(360, (e.clientX - rect.left) / rect.width * 360));
    updatePickerUI();
}
pickerHue.addEventListener('pointerdown', e => {
    handleHue(e); pickerHue.setPointerCapture(e.pointerId);
    const move = ev => handleHue(ev);
    const up = () => { pickerHue.removeEventListener('pointermove', move); };
    pickerHue.addEventListener('pointermove', move);
    pickerHue.addEventListener('pointerup', up, { once: true });
});

createBtn.addEventListener('click', () => {
    parent.postMessage({
        pluginMessage: { type: 'create-palette', scale: state.scale, name: state.inputHex }
    }, '*');
});
cancelBtn.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
});

// Boot
onInputChange();
</script>
</body>
</html>
